<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings - Admin Panel</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/components.css">
</head>
<body>
    <div class="container">
        <header>
            <!-- Include header component -->
            <div id="header"></div>
        </header>
        <aside>
            <!-- Include sidebar component -->
            <div id="sidebar"></div>
        </aside>
        <main>
            <h1>Settings</h1>
            <form id="settings-form">
                <div class="form-group">
                    <label for="app-name">Application Name</label>
                    <input type="text" id="app-name" name="app-name" required>
                </div>
                <div class="form-group">
                    <label for="app-email">Support Email</label>
                    <input type="email" id="app-email" name="app-email" required>
                </div>
                <div class="form-group">
                    <label for="app-theme">Theme</label>
                    <select id="app-theme" name="app-theme">
                        <option value="light">Light</option>
                        <option value="dark">Dark</option>
                    </select>
                </div>
                <button type="submit">Save Settings</button>
            </form>
        </main>
        <footer>
            <!-- Include footer component -->
            <div id="footer"></div>
        </footer>
    </div>
    <script src="../js/app.js"></script>
    <script src="../js/sidebar.js"></script>
</body>
</html>
